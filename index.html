<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - Registrar y Consultar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #ffffff;
        }
        h2 {
            font-family: 'Times New Roman', Times, serif;
            font-size: 28px;
            margin-bottom: 20px;
        }
        /* Estilos del Formulario */
        .formulario-container {
            background-color: #f9f9f9;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-bottom: 30px;
            max-width: 500px;
        }
        .grupo-campo {
            margin-bottom: 15px;
        }
        .grupo-campo label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .grupo-campo input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .btn-guardar {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-guardar:hover {
            background-color: #45a049;
        }
        /* Estilos de la Tabla */
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: center;
        }
        th {
            background-color: #f9f9f9;
            font-weight: bold;
        }
        .btn-editar {
            color: #0000ff;
            text-decoration: none;
            font-weight: bold;
        }
        .btn-eliminar {
            color: #ff0000;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>Registrar Nuevo Producto</h2>
    <div class="formulario-container">
        <form id="formularioProducto">
            <div class="grupo-campo">
                <label for="nombre">Producto:</label>
                <input type="text" id="nombre" required placeholder="">
            </div>
            <div class="grupo-campo">
                <label for="cantidad">Cantidad:</label>
                <input type="number" id="cantidad" required placeholder="">
            </div>
            <div class="grupo-campo">
                <label for="precio">Precio (L.):</label>
                <input type="number" step="0.01" id="precio" required placeholder="">
            </div>
            <button type="submit" class="btn-guardar">Agregar a la Lista</button>
        </form>
    </div>

    <hr>

    <h2>Consultar y Modificar Productos</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Producto</th>
                <th>Cantidad</th>
                <th>Precio</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla">
            <tr>
                <td>1</td>
                <td>Teclado</td>
                <td>15</td>
                <td>L.350.00</td>
                <td>
                    <a href="#" class="btn-editar">Editar</a> | 
                    <a href="#" class="btn-eliminar">Eliminar</a>
                </td>
            </tr>
            <tr>
                <td>2</td>
                <td>Mouse</td>
                <td>20</td>
                <td>L.180.00</td>
                <td>
                    <a href="#" class="btn-editar">Editar</a> | 
                    <a href="#" class="btn-eliminar">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>

    <script>
        let contadorID = 3; 

        document.getElementById('formularioProducto').addEventListener('submit', function(event) {
            event.preventDefault(); 

            
            const nombre = document.getElementById('nombre').value;
            const cantidad = document.getElementById('cantidad').value;
            const precio = parseFloat(document.getElementById('precio').value).toFixed(2);

            
            const tabla = document.getElementById('cuerpoTabla');

            
            const nuevaFila = document.createElement('tr');
            nuevaFila.innerHTML = `
                <td>${contadorID}</td>
                <td>${nombre}</td>
                <td>${cantidad}</td>
                <td>L.${precio}</td>
                <td>
                    <a href="#" class="btn-editar">Editar</a> | 
                    <a href="#" class="btn-eliminar" onclick="eliminarFila(this)">Eliminar</a>
                </td>
            `;

            
            tabla.appendChild(nuevaFila);

          
            contadorID++;

    
            document.getElementById('formularioProducto').reset();
        });

       
        function eliminarFila(enlace) {
            if(confirm("¿Seguro que quieres eliminar este producto?")) {
                enlace.closest('tr').remove();
            }
        }
    </script>

</body>
</html>
